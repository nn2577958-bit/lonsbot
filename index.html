<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>팰월드 론즈서버 LONS 로그인</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #050816;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.3);
      border-radius: 16px;
      padding: 24px 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }
    .field-label {
      font-size: 13px;
      margin-bottom: 4px;
    }
    .input {
      width: 100%;
      padding: 9px 11px;
      border-radius: 9px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      outline: none;
      font-size: 13px;
      box-sizing: border-box;
    }
    .input:focus {
      border-color: #38bdf8;
    }
    .row {
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-top: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }
    .btn-primary:hover {
      filter: brightness(1.05);
    }
    .btn-google {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-google img {
      width: 16px;
      height: 16px;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 12px 0;
      font-size: 12px;
      color: #6b7280;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #1f2937;
    }
    .divider span {
      padding: 0 8px;
    }
    .support-btn {
      width: 100%;
      padding: 9px 11px;
      border-radius: 9px;
      border: 1px solid #f97316;
      background: rgba(234, 88, 12, 0.15);
      color: #fed7aa;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .time-box {
      margin-top: 12px;
      padding: 10px 11px;
      border-radius: 9px;
      background: #020617;
      border: 1px solid #1f2937;
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.45;
    }
    .time-box strong {
      color: #e5e7eb;
      font-weight: 600;
    }
    .user-info {
      margin-top: 10px;
      font-size: 12px;
      color: #a5b4fc;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">LONS 로그인</div>
    <div class="subtitle">팰월드 론즈서버 전용 로그인 페이지</div>

    <!-- 이메일/비밀번호 로그인 폼 (기존에 쓰면 여기 연결하면 됨) -->
    <div class="row">
      <div class="field-label">이메일</div>
      <input id="email" class="input" type="email" placeholder="example@naver.com" />
    </div>
    <div class="row">
      <div class="field-label">비밀번호</div>
      <input id="password" class="input" type="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" id="emailLoginBtn">이메일로 로그인</button>

    <div class="divider">
      <span>또는</span>
    </div>

    <!-- 구글 로그인 버튼 -->
    <button class="btn btn-google" id="googleLoginBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      <span>Google 계정으로 로그인</span>
    </button>

    <!-- 론즈서버 후원 버튼 -->
    <button class="support-btn" id="supportBtn">
      론즈서버 후원하기
    </button>

    <!-- 로그인된 유저 정보 표시용 -->
    <div class="user-info" id="userInfo" style="display:none;"></div>

    <!-- 시간 박스 -->
    <div class="time-box" id="timeBox">
      <div><strong>한국 시간</strong>: -</div>
      <div><strong>UTC</strong>: -</div>
      <div><strong>미국 동부</strong>: -</div>
    </div>
  </div>

  <!-- Firebase SDKs (v9 compat or modular 중 하나 골라야 하는데, 여기선 모듈 번들 방식) -->
  <script type="module">
    // Firebase SDKs
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 너가 준 config 그대로 사용
    const firebaseConfig = {
      apiKey: "AIzaSyCyiAepd539cBTPwtcVnAR-HJbb8roLJmE",
      authDomain: "lons-dc24d.firebaseapp.com",
      databaseURL: "https://lons-dc24d-default-rtdb.firebaseio.com",
      projectId: "lons-dc24d",
      storageBucket: "lons-dc24d.firebasestorage.app",
      messagingSenderId: "755692328918",
      appId: "1:755692328918:web:a4eb4563cb862d3eb5b677",
      measurementId: "G-NCE37YM3LF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const googleBtn = document.getElementById("googleLoginBtn");
    const emailBtn = document.getElementById("emailLoginBtn");
    const userInfo = document.getElementById("userInfo");
    const supportBtn = document.getElementById("supportBtn");

    googleBtn.addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        userInfo.style.display = "block";
        userInfo.textContent = `로그인됨: ${user.displayName || "이름 없음"} (${user.email})`;
      } catch (err) {
        alert("구글 로그인 실패: " + err.message);
      }
    });

    emailBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) {
        alert("이메일과 비밀번호를 입력해 주세요.");
        return;
      }
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const user = cred.user;
        userInfo.style.display = "block";
        userInfo.textContent = `이메일 로그인됨: ${user.email}`;
      } catch (err) {
        alert("이메일 로그인 실패: " + err.message);
      }
    });

    // 후원 버튼 클릭 시 이동할 주소 (원하는 링크로 바꿔)
    supportBtn.addEventListener("click", () => {
      window.open("https://rani-mall.xyz/support", "_blank");
    });

    // 로그인 상태 변화 감지
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userInfo.style.display = "block";
        userInfo.textContent = `로그인 유지 중: ${user.displayName || "이름 없음"} (${user.email})`;
      } else {
        // 로그아웃 상태
      }
    });

    // 시간 표시
    function updateTimes() {
      const now = new Date();

      const kr = now.toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
      const utc = now.toLocaleString("en-GB", { timeZone: "UTC" });
      const est = now.toLocaleString("en-US", { timeZone: "America/New_York" });

      const box = document.getElementById("timeBox");
      const lines = box.querySelectorAll("div");
      lines[0].innerHTML = `<strong>한국 시간</strong>: ${kr}`;
      lines[1].innerHTML = `<strong>UTC</strong>: ${utc}`;
      lines[2].innerHTML = `<strong>미국 동부</strong>: ${est}`;
    }

    updateTimes();
    setInterval(updateTimes, 1000);
  </script>
</body>
</html>
